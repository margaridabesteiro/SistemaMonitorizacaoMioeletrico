<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RehabLink | Nova Prescrição</title>
    <link rel="shortcut icon" href="../../assets/img/logo.jpg" type="image/jpg">
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/medico.css">
</head>
<body>
    <header class="topbar d-flex justify-content-between align-items-center px-4 py-3">
        <div class="sistema-nome">
            <a href="../index_M.html" class="text-decoration-none d-flex align-items-center gap-3">
                <i class="fa-solid fa-stethoscope logo-icon"></i>
                <span class="fw-bold">RehabLink · Médico</span>
            </a>
        </div>
        <div class="dropdown">
            <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                <i class="fa-solid fa-user-nurse"></i> Dra. Margarida Besteiro
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <!-- NOVO: Link para Perfil -->
                <li><a class="dropdown-item" href="../perfil.html"><i class="fa-regular fa-user me-2"></i>Meu Perfil</a>
                </li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item" href="../config/preferencias.html"><i
                            class="fa-solid fa-gear me-2"></i>Preferências</a></li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item" href="../../../private/login/login.html"><i
                            class="fa-solid fa-key me-2"></i>Alterar password</a></li>
                <li><a class="dropdown-item" href="../../../index.html"><i
                            class="fa-solid fa-arrow-right-from-bracket me-2"></i>Sair</a></li>
            </ul>
        </div>
    </header>

    <div class="wrapper">
        <nav class="sidebar">
            <h2><i class="fa-solid fa-bars me-2"></i>Menu Clínico</h2>
            <a href="../index_M.html" class="nav-link"><i class="fa-solid fa-chart-line me-2"></i>Dashboard</a>
            <a href="../consultas/consulta.html" class="nav-link"><i class="fa-regular fa-calendar-check me-2"></i>Consultas</a>
            <a href="lista_prescricoes.html" class="nav-link"><i class="fa-solid fa-file-medical me-2"></i>Prescrições</a>
            <a href="../pacientes/gestaoUtente.html" class="nav-link"><i class="fa-solid fa-users me-2"></i>Pacientes</a>
        </nav>

        <main class="content">
            <h1 class="mb-4">Nova Prescrição</h1>

            <form class="progress-card">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Paciente</label>
                        <select class="form-select" id="paciente" required>
                            <option value="">Selecionar paciente...</option>
                            <option>Ana Ferreira</option>
                            <option>João Rodrigues</option>
                            <option>Maria Santos</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipo de Prescrição</label>
                        <select class="form-select" id="tipoPrescricao" required>
                            <option>Força de pinça</option>
                            <option>Treino de precisão</option>
                            <option>Avaliação funcional</option>
                            <option>Jogos de reabilitação</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Nº de Sessões</label>
                        <input type="number" class="form-control" id="numSessoes" value="12" min="1" max="365">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Frequência</label>
                        <select class="form-select">
                            <option>3x por semana</option>
                            <option>2x por semana</option>
                            <option>1x por semana</option>
                            <option>Diário</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Zona Alvo (N)</label>
                        <input type="text" class="form-control" id="zonaAlvo" value="8-12" pattern="[0-9]+[-][0-9]+" placeholder="Ex: 8-12">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Observações</label>
                    <textarea class="form-control" rows="3" placeholder="Instruções adicionais..."></textarea>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <button type="button" class="btn-reset" onclick="history.back()">Cancelar</button>
                    <button type="button" class="btn-filter" onclick="guardarPrescricao()">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Guardar Prescrição
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>

    <script>
        function guardarPrescricao() {
            const paciente = document.getElementById('paciente');
            const numSessoes = document.getElementById('numSessoes');
            
            if (paciente && !paciente.value) {
                alert('Por favor, selecione um paciente.'); return;
            }
            if (numSessoes && (parseInt(numSessoes.value) < 1 || parseInt(numSessoes.value) > 365)) {
                alert('O número de sessões deve estar entre 1 e 365.'); return;
            }
            
            alert('Prescrição guardada com sucesso!');
            window.location.href = 'lista_prescricoes.html';
        }
    </script>
</body>
</html>
