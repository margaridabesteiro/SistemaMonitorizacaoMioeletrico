<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTech Clinical Labs</title>
    <!--favicon-->
    <link rel="shortcut icon" href="../assets/img/logo.jpg" type="image/jpg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Font Awesome (local) -->
    <link rel="stylesheet" href="../assets/fontawesome/all.min.css">

    <!-- estilos da página -->
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/bootstrap/bootstrap.min.css">
</head>

<body>
    <a href="../index.html" class="btn-voltar" title="Voltar à página inicial">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="login-container">
        <div class="login-card text-center">
            <img src="../assets/img/logo.jpg" alt="Logotipo HealthTech">
            <form action="../utilizadores.html" method="get">
                <div class="mb-3 text-start">
                    <label for="email" class="form-label">Utilizador</label>
                    <input type="email" name="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3 text-start">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-block w-100">Entrar <i
                        class="fa-solid fa-right-to-bracket ms-2"></i></button>
            </form>

            <div class="login-error">
                Erro: Utilizador não registado
            </div>
        </div>
    </div>

    <script src="assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
