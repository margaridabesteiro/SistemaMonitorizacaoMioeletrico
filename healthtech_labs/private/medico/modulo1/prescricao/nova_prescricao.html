            </ul>
        </div>
    </header>

    <!-- Sidebar + Conteúdo -->
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <h2>Menu</h2>
            <a href="../../modulo2/dashboard_medico_agendamentos.html" class="nav-link"><i

                Transporte da Amostra</a>

                Exames </a>
        </nav>

        <!-- Conteúdo principal -->
        <main class="col-md-9 col-lg-10 p-4">
            <div class="dashboard-tabs">
                <a href="lista_prescricoes.html" class="tab ">Lista Prescrições</a>
                <a href="nova_prescricao.html" class="tab active">Nova Prescrição</a>

            </div>
            <div class="card shadow p-4">
                <h2 class="mb-4"><i class="fa-solid fa-file-medical me-2"></i>Nova Prescrição</h2>
                <form id="formPrescricao">
                    <div class="mb-3">
                        <label class="form-label">Utente</label>
                        <select class="form-select" id="ID_Utente" required>
                            <option value="">Selecione o utente</option>

                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data da Prescrição</label>
                            <input type="date" class="form-control" id="Data_Prescricao" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data de Validade</label>
                            <input type="date" class="form-control" id="Data_Validade" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de Prescrição</label>
                        <select class="form-select" id="Tipo_Prescricao" required>
                            <option value="">Selecione</option>
                            <option value="Sns">SNS</option>
                            <option value="Privado">Privado</option>
                            <option value="Particular">Particular</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Nº Requisição</label>
                            <input type="text" class="form-control" id="Num_Requisicao" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Código Acesso</label>
                            <input type="text" class="form-control" id="Cod_Acesso" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Código Prestação</label>
                            <input type="text" class="form-control" id="Cod_Prestacao" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Prioridade</label>
                        <select class="form-select" id="Prioridade" required>
                            <option value="">Selecione</option>
                            <option value="Normal">Normal</option>
                            <option value="Urgente">Urgente</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" id="Observacoes" rows="3"></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mb-4">
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-check me-1"></i> Criar Prescrição
                        </button>
                        <a href="../prescricao/lista_prescricoes.html" class="btn btn-outline-secondary">
                            <i class="fa-solid fa-xmark me-1"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </main>
