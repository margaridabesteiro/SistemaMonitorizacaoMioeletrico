    <main class="col-md-9 col-lg-10 p-4">
      <div class="card shadow p-4">
        <h2 class="mb-4"><i class="fa-solid fa-file-medical me-2"></i><strong>Editar Prescrição</strong></h2>


        <div id="prescricaoInfo" class="mb-3"></div>


        <form id="formEditarPrescricao" style="display: none;">

          <div class="mb-3">
            <label for="ID_Prescricao" class="form-label fw-bold">ID da Prescrição</label>
            <input type="text" id="ID_Prescricao" class="form-control" readonly>
          </div>


          <div class="mb-3">
            <label for="ID_Utente" class="form-label fw-bold">Utente</label>
            <select id="ID_Utente" class="form-select" required>
              <option value="">Selecione o utente</option>

            </select>
          </div>

          <div class="row">

            <div class="col-md-4 mb-3">
              <label for="Data_Prescricao" class="form-label fw-bold">Data Prescrição</label>
              <input type="date" id="Data_Prescricao" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
              <label for="Data_Validade" class="form-label fw-bold">Data Validade</label>
              <input type="date" id="Data_Validade" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
              <label for="Tipo_Prescricao" class="form-label fw-bold">Tipo Prescrição</label>
              <select id="Tipo_Prescricao" class="form-select" required>
                <option value="">Selecione o tipo</option>
                <option value="SNS">SNS</option>
                <option value="Privado">Privado</option>
                <option value="Particular">Particular</option>
              </select>
            </div>
          </div>

          <div class="row">

            <div class="col-md-4 mb-3">
              <label for="Num_Requisicao" class="form-label fw-bold">Nº Requisição</label>
              <input type="text" id="Num_Requisicao" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
              <label for="Cod_Acesso" class="form-label fw-bold">Código Acesso</label>
              <input type="text" id="Cod_Acesso" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
              <label for="Cod_Prestacao" class="form-label fw-bold">Código Prestação</label>
              <input type="text" id="Cod_Prestacao" class="form-control" required>
            </div>
          </div>

          <div class="row">

            <div class="col-md-6 mb-3">
              <label for="Prioridade" class="form-label fw-bold">Prioridade</label>
              <select id="Prioridade" class="form-select" required>
                <option value="">Selecione a prioridade</option>
                <option value="Normal">Normal</option>
                <option value="Urgente">Urgente</option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label for="Observacoes" class="form-label fw-bold">Observações</label>
              <textarea id="Observacoes" class="form-control" rows="2"></textarea>
            </div>
          </div>

          <hr class="my-4">
          <h5 class="fw-bold">Exames Associados</h5>
          <div id="listaExamesEdit" class="row mb-3"></div>


          <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="lista_prescricoes.html" class="btn btn-outline-secondary">
              <i class="fa-solid fa-arrow-left me-2"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-success">
              <i class="fa-solid fa-check me-2"></i> Guardar Alterações
            </button>
          </div>
      </div>
      </form>
