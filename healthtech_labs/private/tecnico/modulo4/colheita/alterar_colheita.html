    <main class="col-md-9 col-lg-10 p-4">
      <div class="card shadow p-4">
        <h2 class="mb-4"><i class="fa-solid fa-syringe me-2"></i><strong>Alterar Colheita</strong></h2>

        <form id="formEditarColheita">
          <div class="mb-3">
            <label for="ID_Colheita" class="form-label fw-bold">ID da Colheita</label>
            <input type="text" id="ID_Colheita" class="form-control" readonly>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="Data_Colheita" class="form-label fw-bold">Data</label>
              <input type="date" id="Data_Colheita" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="Hora_Colheita" class="form-label fw-bold">Hora</label>
              <input type="time" id="Hora_Colheita" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="ID_Tecnico" class="form-label fw-bold">Técnico</label>
              <select id="ID_Tecnico" class="form-select" required></select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="ID_Utente" class="form-label fw-bold">Utente</label>
              <select id="ID_Utente" class="form-select" required></select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="ID_Posto" class="form-label fw-bold">Posto</label>
              <select id="ID_Posto" class="form-select" required></select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Condições da Colheita</label><br>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="Condicoes_OK" value="1" id="condOk">
              <label class="form-check-label" for="condOk">OK</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="Condicoes_OK" value="0" id="condNao">
              <label class="form-check-label" for="condNao">Não OK</label>
            </div>
          </div>

          <div class="mb-3">
            <label for="Garrote_Excedido" class="form-label fw-bold">Garrote Excedido?</label>
            <select id="Garrote_Excedido" class="form-select">
              <option value="">Selecione</option>
              <option value="Sim">Sim</option>
              <option value="Não">Não</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="Notas" class="form-label fw-bold">Notas</label>
            <textarea id="Notas" class="form-control" rows="3"></textarea>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="detalhes_colheita.html" class="btn btn-outline-secondary">
              <i class="fa-solid fa-arrow-left me-2"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-outline-primary">
              <i class="fa-solid fa-check me-2"></i> Guardar Alterações
            </button>
          </div>
        </form>
      </div>
