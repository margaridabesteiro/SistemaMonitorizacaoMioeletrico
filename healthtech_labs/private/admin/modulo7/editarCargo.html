    <!-- Conteúdo Principal -->
    <main class="content container mt-4">
      <h1 class="mb-4">Editar Cargo</h1>
      <form id="formEditarCargo" class="row g-3">
        <div class="col-md-2 form-group">
          <label for="inputIdCargo" class="form-label">ID Cargo</label>
          <input type="text" class="form-control readonly-input" id="inputIdCargo" readonly />
        </div>
        <div class="col-md-5 form-group">
          <label for="inputNomeCargo" class="form-label">Nome<span class="obrigatorio">*</span></label>
          <input type="text" class="form-control" id="inputNomeCargo" required />
        </div>
        <div class="col-md-3 form-group">
          <label for="inputNivelHierarquico" class="form-label">Nível Hierárquico<span
              class="obrigatorio">*</span></label>
          <input type="number" class="form-control" id="inputNivelHierarquico" min="1" required />
        </div>
        <div class="col-12 d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-secondary" id="btnCancelar">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary">Atualizar</button>
        </div>
      </form>

  <!-- Scripts JS no fim do body -->
  <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/1221419.js" defer></script>
  <script>
    // --------------------------------------------------------
    // Simulação de dados de Cargos
    // --------------------------------------------------------
    const cargos = [
      { id: 1, nome: "Médico Plantonista", nivelHierarquico: 1 },
      { id: 2, nome: "Médico Assistente", nivelHierarquico: 2 },
      { id: 3, nome: "Enfermeiro Chefe", nivelHierarquico: 3 },
      { id: 4, nome: "Enfermeiro", nivelHierarquico: 4 },
      { id: 5, nome: "Técnico de Enfermagem", nivelHierarquico: 5 },
      { id: 6, nome: "Rececionista", nivelHierarquico: 6 },
    ];

    function getParametroId() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get("idCargo"), 10);
    }

    function preencherFormulario(obj, id) {
      document.getElementById("inputIdCargo").value = id;
      document.getElementById("inputNomeCargo").value = obj.nome || "";
      document.getElementById("inputNivelHierarquico").value =
        obj.nivelHierarquico || "";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const id = getParametroId();
      let encontrado = cargos.find((c) => c.id === id);
      if (!encontrado) {
        encontrado = { nome: "", nivelHierarquico: "" };
      }
      preencherFormulario(encontrado, id);

      document.getElementById("btnCancelar").onclick = () => {
        window.location.href = "monitorizacaoEmissaoExames.html";
      };

      document.getElementById("formEditarCargo").onsubmit = (e) => {
        e.preventDefault();
        alert("Cargo atualizado com sucesso!");
        window.location.href = "monitorizacaoEmissaoExames.html";
      };
    });
  </script>
