<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registo Utente – HealthTech Clinical Labs</title>
  <!-- Favicon -->
  <link rel="shortcut icon" href="../assets/img/logo.jpg" type="image/jpg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,700;1,400&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="../public/assets/fontawesome/all.min.css" />

  <!-- Bootstrap e CSS Comum -->
  
  <link rel="stylesheet" href="../public/assets/bootstrap/bootstrap.min.css" />
  <link rel="stylesheet" href="../public/assets/css/1211150.css"/>
</head>

<body class="menu-user">
  
  <header class="topbar d-flex justify-content-between align-items-center px-4 py-4">
    <div class="sistema-nome d-flex align-items-center gap-2">
      <i class="fa-solid fa-flask-vial logo-icon"></i> <strong>HealthTech Clinical Labs</strong>
    </div>
    <a href="index.html" class="nav-link">
        <i class="fa-solid fa-right-to-bracket"></i> <strong>Página inicial</strong>
      </a>
  </header>

  <!-- Sidebar + Conteúdo -->
   <div class="registo">
     <div class="wrapper">
    <!-- Card de Registo -->
    <div class="card register-card">
      <div class="card-header">
        <i class="fa-solid fa-user-plus"></i> Registar Utente
      </div>
      <div class="card-body">
        <form id="formRegistarUtente" action="#" method="post" novalidate>
          <!-- Nome Completo -->
          <div class="row mb-3">
            <div class="col-12">
              <label for="inputNome" class="form-label">Nome Completo <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                id="inputNome"
                name="nome"
                placeholder="Ex.: João da Silva"
                required
              />
            </div>
          </div>

          <!-- Morada (Rua, nº, complemento) -->
          <div class="row mb-3">
            <div class="col-12">
              <label for="inputMorada" class="form-label">Morada</label>
              <input
                type="text"
                class="form-control"
                id="inputMorada"
                name="morada"
                placeholder="Rua das Flores, 123, 2º DTO"
              />
            </div>
          </div>

          <!-- Código Postal, Cidade, Contacto, Email -->
          <div class="row mb-3">
            <div class="col-md-3">
              <label for="inputCodPostal" class="form-label">Código Postal <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                id="inputCodPostal"
                name="cod_postal"
                placeholder="1000-001"
                required
              />
              <div class="form-text">Formato: 1234-567</div>
            </div>
            <div class="col-md-3">
              <label for="inputCidade" class="form-label">Cidade <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                id="inputCidade"
                name="cidade"
                placeholder="Lisboa"
                required
              />
            </div>
            <div class="col-md-3">
              <label for="inputContacto" class="form-label">Contacto (Tel.) <span class="text-danger">*</span></label>
              <input
                type="tel"
                class="form-control"
                id="inputContacto"
                name="contacto"
                placeholder="912345678"
                required
              />
            </div>
            <div class="col-md-3">
              <label for="inputEmail" class="form-label">Email <span class="text-danger">*</span></label>
              <input
                type="email"
                class="form-control"
                id="inputEmail"
                name="email"
                placeholder="utente@exemplo.com"
                required
              />
            </div>
          </div>

          <!-- Sexo e Data de Nascimento -->
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Sexo <span class="text-danger">*</span></label>
              <div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="sexo"
                    id="radioMasculino"
                    value="M"
                    checked
                  />
                  <label class="form-check-label" for="radioMasculino">Masculino</label>
                </div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="sexo"
                    id="radioFeminino"
                    value="F"
                  />
                  <label class="form-check-label" for="radioFeminino">Feminino</label>
                </div>
              </div>
            </div>
            <div class="col-md-6">
              <label for="inputDataNasc" class="form-label">Data de Nascimento <span class="text-danger">*</span></label>
              <input
                type="date"
                class="form-control"
                id="inputDataNasc"
                name="data_nascimento"
                placeholder="dd/mm/aaaa"
                required
              />
            </div>
          </div>

          <!-- NIF e Número SNS -->
          <div class="row mb-3">
            <div class="col-md-6">
              <label for="inputNIF" class="form-label">NIF <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                id="inputNIF"
                name="nif"
                placeholder="123456789"
                maxlength="9"
                required
              />
              <div class="form-text">9 dígitos numéricos</div>
            </div>
            <div class="col-md-6">
              <label for="inputSNS" class="form-label">Número SNS</label>
              <input
                type="text"
                class="form-control"
                id="inputSNS"
                name="numero_sns"
                placeholder="123456789012"
                disabled
              />
              <div class="form-text" id="textoAjudaSNS1">Selecione o subsistema de saúde</div>
              <div class="form-text text-muted d-none" id="textoAjudaSNS">
                Número SNS só é obrigatório se subsistema for “SNS”
              </div>
            </div>
          </div>

          <!-- Subsistema de Saúde -->
          <div class="row mb-4">
            <div class="col-md-6">
              <label for="selectSubsistema" class="form-label">Subsistema de Saúde <span class="text-danger">*</span></label>
              <select
                class="form-select"
                id="selectSubsistema"
                name="subsistema_saude"
                required
              >
                <option value="" selected>Escolha um</option>
                <option value="SNS">SNS</option>
                <option value="ADSE">ADSE</option>
                <option value="Particular">Particular</option>
                
              </select>
            </div>
          </div>

          <div class="d-flex flex-wrap justify-content-end gap-2 mb-4">
            <a href="login.html" class="btn btn-outline-secondary">
              <i class="fa-solid fa-arrow-left me-1"></i> Voltar
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="fa-regular fa-floppy-disk me-1"></i> Guardar Utente
            </button>
          </div>

          <!-- Alerta de Erro -->
          <div
            class="alert alert-danger text-center d-none"
            id="alertErro"
            role="alert"
          >
            Por favor, preencha todos os campos obrigatórios corretamente.
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

  <script src="../public/assets/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="../public/js/1211150.js"></script>
</body>
</html>
