        <!-- Separador visual -->

    <a href="../config/preferencias.html" class="nav-link"><i class="fa-solid fa-gear me-2"></i>Preferências</a>
    <a href="../ajuda/faq.html" class="nav-link"><i class="fa-regular fa-circle-question me-2"></i>Ajuda</a>
</nav>

        <main class="content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>Preferências do Sistema</h1>
            </div>

            <form>
                <!-- Notificações -->
                <div class="progress-card mb-4">
                    <h5><i class="fa-regular fa-bell me-2" style="color: #1a5f8a;"></i>Notificações</h5>
                    <hr>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="notifAlertas" checked>
                        <label class="form-check-label" for="notifAlertas">
                            Receber alertas clínicos (pacientes sem treino, redução de força)
                        </label>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="notifSessoes" checked>
                        <label class="form-check-label" for="notifSessoes">
                            Receber lembretes de sessões agendadas
                        </label>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="notifMensagens" checked>
                        <label class="form-check-label" for="notifMensagens">
                            Receber notificações de novas mensagens
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="notifRelatorios">
                        <label class="form-check-label" for="notifRelatorios">
                            Receber resumos semanais por email
                        </label>
                    </div>
                </div>

                <!-- Visualização -->
                <div class="progress-card mb-4">
                    <h5><i class="fa-solid fa-eye me-2" style="color: #1a5f8a;"></i>Visualização</h5>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">Tema</label>
                        <select class="form-select" style="max-width: 200px;">
                            <option selected>Claro</option>
                            <option>Escuro</option>
                            <option>Sistema</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dashboard inicial</label>
                        <select class="form-select" style="max-width: 250px;">
                            <option selected>Dashboard Principal</option>
                            <option>Lista de Pacientes</option>
                            <option>Sessões do Dia</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Itens por página nas tabelas</label>
                        <select class="form-select" style="max-width: 100px;">
                            <option>10</option>
                            <option selected>25</option>
                            <option>50</option>
                            <option>100</option>
                        </select>
                    </div>
                </div>

                <!-- Preferências Clínicas -->
                <div class="progress-card mb-4">
                    <h5><i class="fa-solid fa-stethoscope me-2" style="color: #1a5f8a;"></i>Preferências Clínicas</h5>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">Duração padrão de sessão (minutos)</label>
                        <input type="number" class="form-control" style="max-width: 100px;" value="15" min="5" max="60">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Zona alvo padrão (N)</label>
                        <div class="row">
                            <div class="col-4">
                                <input type="number" class="form-control" placeholder="Mínimo" value="8">
                            </div>
                            <div class="col-4">
                                <input type="number" class="form-control" placeholder="Máximo" value="12">
                            </div>
                        </div>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="gamificacaoDefault" checked>
                        <label class="form-check-label" for="gamificacaoDefault">
                            Ativar gamificação por defeito
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="alertasAutomaticos" checked>
                        <label class="form-check-label" for="alertasAutomaticos">
                            Gerar alertas automáticos quando força desce >20%
                        </label>
                    </div>
                </div>

                <!-- Privacidade -->
                <div class="progress-card mb-4">
                    <h5><i class="fa-solid fa-lock me-2" style="color: #1a5f8a;"></i>Privacidade e Segurança</h5>
                    <hr>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="sessaoAutomatica" checked>
                        <label class="form-check-label" for="sessaoAutomatica">
                            Terminar sessão após 30 minutos de inatividade
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="logsAtividade">
                        <label class="form-check-label" for="logsAtividade">
                            Manter logs de atividade para auditoria
                        </label>
                    </div>
                </div>

                <!-- Botões -->
                <div class="d-flex gap-2 justify-content-end mt-4">
                    <button type="reset" class="btn-reset">Restaurar Padrões</button>
                    <button type="submit" class="btn-filter" onclick="guardarPreferencias()">Guardar Preferências</button>
                </div>
            </form>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
        function guardarPreferencias() {
            alert('Preferências guardadas com sucesso!');
        }
    </script>
</body>
</html>
