<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RehabLink | Editar Profissional</title>
    
    <link rel="shortcut icon" href="../../assets/img/logo.jpg" type="image/jpg">
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/admin.css">
</head>

<body>
    <header class="topbar d-flex justify-content-between align-items-center px-4 py-3">
        <div class="sistema-nome">
            <a href="../index_admin.html" class="text-decoration-none d-flex align-items-center gap-3">
                <i class="fa-solid fa-shield-hal logo-icon"></i>
                <span class="fw-bold">RehabLink · Administrador</span>
            </a>
        </div>
        <div class="dropdown">
            <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                <i class="fa-solid fa-user-gear"></i> Admin
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="../configuracao/sistema.html"><i class="fa-solid fa-gear me-2"></i>Configurações</a></li>
                <li><a class="dropdown-item" href="../seguranca/logs_acesso.html"><i class="fa-solid fa-shield me-2"></i>Logs</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="../../../public/login.html"><i class="fa-solid fa-key me-2"></i>Alterar password</a></li>
                <li><a class="dropdown-item" href="../../../index.html"><i class="fa-solid fa-arrow-right-from-bracket me-2"></i>Sair</a></li>
            </ul>
        </div>
    </header>

    <div class="wrapper">
        <nav class="sidebar">
            <h2><i class="fa-solid fa-bars me-2"></i>Menu Administrativo</h2>
            <a href="../index_admin.html" class="nav-link"><i class="fa-solid fa-chart-line me-2"></i>Dashboard</a>
            <a href="../utilizadores/lista_utilizadores.html" class="nav-link"><i class="fa-solid fa-users me-2"></i>Utilizadores</a>
            <a href="gestao_PS.html" class="nav-link active"><i class="fa-solid fa-user-doctor me-2"></i>Profissionais Saúde</a>
            <a href="../dispositivos/lista_dispositivos.html" class="nav-link"><i class="fa-solid fa-microchip me-2"></i>Dispositivos</a>
            <a href="../faturacao/controlo_faturacao.html" class="nav-link"><i class="fa-solid fa-file-invoice-dollar me-2"></i>Faturação</a>
            <a href="../relatorios/relatorios_sistema.html" class="nav-link"><i class="fa-regular fa-file-lines me-2"></i>Relatórios</a>
            <a href="../seguranca/logs_acesso.html" class="nav-link"><i class="fa-solid fa-shield me-2"></i>Segurança</a>
            <a href="../configuracao/sistema.html" class="nav-link"><i class="fa-solid fa-gear me-2"></i>Configuração</a>
        </nav>

        <main class="content">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="gestao_PS.html">Profissionais Saúde</a></li>
                    <li class="breadcrumb-item active">Editar Profissional</li>
                </ol>
            </nav>

            <h1 class="mb-4">Editar Profissional de Saúde</h1>

            <form class="progress-card">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" value="Dra. Carla Santos">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="carla.santos@rehablink.com">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Profissão</label>
                        <select class="form-select">
                            <option value="fisioterapeuta" selected>Fisioterapeuta</option>
                            <option value="medico">Médico</option>
                            <option value="enfermeiro">Enfermeiro</option>
                            <option value="terapeuta">Terapeuta Ocupacional</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Especialidade</label>
                        <input type="text" class="form-control" value="Reabilitação de Amputados">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Número de Cédula</label>
                        <input type="text" class="form-control" value="F-12345">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Anos de Experiência</label>
                        <input type="number" class="form-control" value="12">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Telemóvel</label>
                        <input type="tel" class="form-control" value="912 345 678">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Estado</label>
                        <select class="form-select">
                            <option value="ativo" selected>Ativo</option>
                            <option value="inativo">Inativo</option>
                            <option value="ferias">Férias</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Clínica / Local de Trabalho</label>
                    <input type="text" class="form-control" value="Clínica RehabLink - Porto">
                </div>

                <div class="mb-3">
                    <label class="form-label">Horário de Trabalho</label>
                    <input type="text" class="form-control" value="Segunda a Sexta, 09:00-18:00">
                </div>

                <div class="mb-3">
                    <label class="form-label">Observações</label>
                    <textarea class="form-control" rows="3">Especialista em reabilitação de amputados e próteses mioelétricas.</textarea>
                </div>

                <hr>

                <div class="d-flex gap-2 justify-content-between">
                    <button type="button" class="btn-danger" onclick="desativarProfissional()">
                        <i class="fa-solid fa-user-slash me-2"></i>Desativar Profissional
                    </button>
                    <div>
                        <button type="button" class="btn-reset" onclick="history.back()">Cancelar</button>
                        <button type="submit" class="btn-filter ms-2" onclick="guardarAlteracoes()">Guardar Alterações</button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
        function guardarAlteracoes() {
            alert('Alterações guardadas com sucesso!');
            window.location.href = 'gestao_PS.html';
        }
        function desativarProfissional() {
            if(confirm('Desativar este profissional? Ele não terá acesso ao sistema.')) {
                alert('Profissional desativado');
                window.location.href = 'gestao_PS.html';
            }
        }
    </script>
</body>
</html>
